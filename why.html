<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управления окнами</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="why.css">
</head>

<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">
<div class="rowa">
        <div style="margin-left: 0;" id="seting" class="seting row justify-content-center mb-3">
            <div class="seting-modal col-12 col-sm-8 col-md-6">
                <a id="settingsBtn" href="#" class="a btn btn-settings btn-lg w-100 rounded-3 fw-bold" data-bs-toggle="modal" data-bs-target="#settingsModal">
                    ⚙️ Настройки
                </a>
            </div>
            <div id="boot" class="boot">
                <p style="padding: 1%;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="2vw" height="2vw" fill="currentColor" class="bi bi-caret-down" viewBox="0 0 16 16">
                        <path d="M3.204 5h9.592L8 10.481zm-.753.659 4.796 5.48a1 1 0 0 0 1.506 0l4.796-5.48c.566-.647.106-1.659-.753-1.659H3.204a1 1 0 0 0-.753 1.659"/>
                    </svg>
                </p>
            </div>
        </div>
    </div>
    

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8">
                
                <div class="card shadow border-0 rounded-4">
                    <div class="card-body p-4 p-md-5">

                        <div id="statusBox" class="status-box text-center mb-4 py-3">
                            <p id="status-text" class="status-text text-muted">Ожидание...</p>
                        </div>
                        
                        <div class="row g-3 mb-4 justify-content-center">
                            <div class="col-4">
                                <div id="win1" class="window-card card h-100 text-center border-2 rounded-3">
                                    <div class="card-body d-flex flex-column justify-content-center align-items-center py-3">
                                        <h3 class="display-4 fw-bold mb-1">1</h3>
                                        <p class="text-muted mb-0">окно</p>
                                    </div>
                                </div>
                            </div>
                            <div class="col-4">
                                <div id="win2" class="window-card card h-100 text-center border-2 rounded-3">
                                    <div class="card-body d-flex flex-column justify-content-center align-items-center py-3">
                                        <h3 class="display-4 fw-bold mb-1">2</h3>
                                        <p class="text-muted mb-0">окно</p>
                                    </div>
                                </div>
                            </div>
                            <div class="col-4">
                                <div id="win3" class="window-card card h-100 text-center border-2 rounded-3">
                                    <div class="card-body d-flex flex-column justify-content-center align-items-center py-3">
                                        <h3 class="display-4 fw-bold mb-1">3</h3>
                                        <p class="text-muted mb-0">окно</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div style="margin-top: 10%;" class="d-flex justify-content-center gap-3 mb-3 flex-wrap">
                            <a id="myLink" href="#" class="btn-start btn btn-lg px-4 rounded-3 fw-bold">
                                ▶ Начать работать
                            </a>
                            <a id="myLinkend" href="#" class="btn-stop btn btn-lg px-4 rounded-3 fw-bold">
                                ■ Выключить
                            </a>
                        </div>
                        
                        <div style="margin: 5% 0 10% 0"  class="row justify-content-center">
                            <div class="col-12 col-sm-8 col-md-6">
                                <a id="myLinkendX" href="#" class="btn-pause btn btn-lg w-100 rounded-3 fw-bold">
                                    Перерыв
                                </a>
                            </div>
                        </div>
                        
                        <!-- Окна 4-6 -->
                        <div class="row g-3 justify-content-center">
                            <div class="col-4">
                                <div id="win4" class="window-card card h-100 text-center border-2 rounded-3">
                                    <div class="card-body d-flex flex-column justify-content-center align-items-center py-3">
                                        <h3 class="display-4 fw-bold mb-1">4</h3>
                                        <p class="text-muted mb-0">окно</p>
                                    </div>
                                </div>
                            </div>
                            <div class="col-4">
                                <div id="win5" class="window-card card h-100 text-center border-2 rounded-3">
                                    <div class="card-body d-flex flex-column justify-content-center align-items-center py-3">
                                        <h3 class="display-4 fw-bold mb-1">5</h3>
                                        <p class="text-muted mb-0">окно</p>
                                    </div>
                                </div>
                            </div>
                            <div class="col-4">
                                <div id="win6" class="window-card card h-100 text-center border-2 rounded-3">
                                    <div class="card-body d-flex flex-column justify-content-center align-items-center py-3">
                                        <h3 class="display-4 fw-bold mb-1">6</h3>
                                        <p class="text-muted mb-0">окно</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                    </div>
                </div>
                
            </div>
        </div>
    </div>

   <div class="modal fade" id="settingsModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">⚙️ Настройки</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label for="passwordInput" class="form-label">🔐 Пароль</label>
                    <input type="password" id="passwordInput" class="form-control" placeholder="Введите пароль">
                    <div id="passwordError" class="invalid-feedback d-block" style="display: none;">
                        
                    </div>
                </div>
                
                <div class="d-grid gap-2">
                    <button type="button" id="crashBtn" class="btn btn-danger btn-lg">
                        💥 Краш (X)
                    </button>
                    <button type="button" id="offBtn" class="btn btn-secondary btn-lg">
                        ⏹ Выключить (пусто)
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="why.js"></script>
    <script src="admin.js"></script>
</body>
</html>
